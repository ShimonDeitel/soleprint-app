<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sole Print - Block Printing Log</title>
<style>
  body { margin:0; background:#1A0D0A; color:#f2ece3; font-family:-apple-system,Helvetica,Arial,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:24px; }
  .wrap { max-width:560px; }
  h1 { color:#F2907D; font-size:2.2rem; margin-bottom:8px; }
  p { font-size:1.1rem; line-height:1.6; color:#d8d0c5; }
  .accent { color:#B23A2E; font-weight:600; }
  a.button { display:inline-block; margin-top:24px; padding:12px 28px; background:#B23A2E; color:#fff; border-radius:10px; text-decoration:none; font-weight:600; }
  footer { margin-top:40px; font-size:0.85rem; color:#8a8378; }
  footer a { color:#F2907D; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #F2907D55 0%, #F2907D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Sole Print - Block Printing Log</h1>
  <p>Track hand-carved block printing projects with ink colors and print runs.</p>
  <p class="accent">Log block carvings with ink color and fabric/paper used.</p>
  <a class="button" href="#">Coming to the App Store</a>
  <footer>
    <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
    Contact: s0533495227@gmail.com
  </footer>
</div>
</body>
</html>
