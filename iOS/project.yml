name: Soleprint
options:
  bundleIdPrefix: com.shimondeitel.blockprintlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Soleprint:
    type: application
    platform: iOS
    sources:
      - path: Soleprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blockprintlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Soleprint/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SoleprintTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoleprintTests
      - path: Soleprint.storekit
    dependencies:
      - target: Soleprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blockprintlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SoleprintUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SoleprintUITests
    dependencies:
      - target: Soleprint
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.blockprintlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Soleprint:
    build:
      targets:
        Soleprint: all
        SoleprintTests: [test]
        SoleprintUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Soleprint.storekit
    test:
      config: Debug
      storeKitConfiguration: Soleprint.storekit
      targets:
        - SoleprintTests
        - SoleprintUITests
    archive:
      config: Release
